name: Build Portable

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  SOLUTION_FILE: Dopamine.sln
  PROJECT_FILE: Dopamine\Dopamine.csproj
  TEST_PROJECT_FILE: Dopamine.Tests\Dopamine.Tests.csproj
  PACKAGER_CONFIG: Dopamine.Packager\PackagerConfiguration.xml
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: AnyCPU
  OUTPUT_DIR: Dopamine\bin\Release
  ARTIFACTS_STAGE_DIR: artifacts\portable  # 暂存准备上传的文件目录
  WINRT_CONTRACTS_VERSION: 10.0.19041.1

jobs:
  build-portable:
    name: Build Portable
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore $env:SOLUTION_FILE -NonInteractive

      - name: Install WinRT contract references
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $packageRoot = Join-Path $env:GITHUB_WORKSPACE 'artifacts\sdk-contracts'
          nuget install Microsoft.Windows.SDK.Contracts `
            -Version $env:WINRT_CONTRACTS_VERSION `
            -OutputDirectory $packageRoot `
            -ExcludeVersion `
            -NonInteractive

          $contractsRoot = Join-Path $packageRoot 'Microsoft.Windows.SDK.Contracts\ref\netstandard2.0'
          if (-not (Test-Path -LiteralPath $contractsRoot -PathType Container)) {
            throw "WinRT contracts directory was not found: $contractsRoot"
          }

          $requiredContracts = @(
            'Windows.Foundation.FoundationContract.winmd',
            'Windows.Foundation.UniversalApiContract.winmd',
            'Windows.Media.MediaControlContract.winmd'
          )

          foreach ($contract in $requiredContracts) {
            $path = Join-Path $contractsRoot $contract
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Required WinRT contract is missing: $path"
            }
          }

          "WINRT_CONTRACTS_ROOT=$contractsRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          @'
          <Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <ItemGroup Condition="'$(UseWinRTContracts)' == 'true' and '$(WinRTContractsRoot)' != ''">
              <Reference Remove="Windows" />
              <Reference Include="$(WinRTContractsRoot)\*.winmd">
                <Private>false</Private>
                <EmbedInteropTypes>false</EmbedInteropTypes>
              </Reference>
            </ItemGroup>
            <Target Name="LogWinRTContractsRoot" BeforeTargets="ResolveReferences" Condition="'$(UseWinRTContracts)' == 'true' and '$(WinRTContractsRoot)' != ''">
              <Message Importance="high" Text="Using WinRT contracts from $(WinRTContractsRoot)" />
            </Target>
          </Project>
          '@ | Set-Content -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'Directory.Build.targets') -Encoding utf8

          $contractCount = (Get-ChildItem -LiteralPath $contractsRoot -Filter *.winmd -File | Measure-Object).Count
          Write-Host "Prepared $contractCount WinRT contract references from $contractsRoot"

      - name: Ensure Windows Runtime reference
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $target = 'C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETCore\v4.5\System.Runtime.WindowsRuntime.dll'
          if (Test-Path -LiteralPath $target) {
            Write-Host "Found required Windows Runtime reference: $target"
            return
          }

          $searchRoots = @(
            'C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework',
            'C:\Program Files\Reference Assemblies\Microsoft\Framework',
            'C:\Program Files (x86)\Windows Kits\10',
            'C:\Program Files (x86)\Microsoft SDKs'
          ) | Where-Object { Test-Path -LiteralPath $_ }

          if ($searchRoots.Count -eq 0) {
            throw "No Windows Runtime reference search roots were found."
          }

          $candidates = foreach ($root in $searchRoots) {
            Get-ChildItem -LiteralPath $root -Filter System.Runtime.WindowsRuntime.dll -Recurse -File -ErrorAction SilentlyContinue
          }

          if ($null -eq $candidates -or $candidates.Count -eq 0) {
            throw "System.Runtime.WindowsRuntime.dll was not found under: $($searchRoots -join '; ')"
          }

          $preferredPatterns = @(
            '*\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.5\Facades\System.Runtime.WindowsRuntime.dll',
            '*\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.8\Facades\System.Runtime.WindowsRuntime.dll',
            '*\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.7.2\Facades\System.Runtime.WindowsRuntime.dll',
            '*\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.7.1\Facades\System.Runtime.WindowsRuntime.dll',
            '*\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.7\Facades\System.Runtime.WindowsRuntime.dll',
            '*\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.6.2\Facades\System.Runtime.WindowsRuntime.dll',
            '*\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.6.1\Facades\System.Runtime.WindowsRuntime.dll',
            '*\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.6\Facades\System.Runtime.WindowsRuntime.dll'
          )

          $source = $null
          foreach ($pattern in $preferredPatterns) {
            $source = $candidates | Where-Object { $_.FullName -like $pattern } | Select-Object -First 1
            if ($null -ne $source) {
              break
            }
          }

          if ($null -eq $source) {
            $source = $candidates | Sort-Object FullName -Descending | Select-Object -First 1
          }

          New-Item -ItemType Directory -Path (Split-Path -Parent $target) -Force | Out-Null
          Copy-Item -LiteralPath $source.FullName -Destination $target -Force
          Write-Host "Copied Windows Runtime reference from '$($source.FullName)' to '$target'"

      - name: Build Dopamine
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          msbuild $env:PROJECT_FILE `
            /m `
            "/p:Configuration=$env:BUILD_CONFIGURATION" `
            "/p:Platform=$env:BUILD_PLATFORM" `
            "/p:UseWinRTContracts=true" `
            "/p:WinRTContractsRoot=$env:WINRT_CONTRACTS_ROOT" `
            /verbosity:minimal

      - name: Build Dopamine tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          msbuild $env:TEST_PROJECT_FILE `
            /m `
            "/p:Configuration=$env:BUILD_CONFIGURATION" `
            "/p:Platform=$env:BUILD_PLATFORM" `
            /verbosity:minimal

      - name: Run Dopamine tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $testAssembly = Join-Path $env:GITHUB_WORKSPACE 'Dopamine.Tests\bin\Release\Dopamine.Tests.dll'
          $adapterPath = Join-Path $env:GITHUB_WORKSPACE 'packages\NUnit3TestAdapter.4.5.0\build\net462'
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'

          if (-not (Test-Path -LiteralPath $testAssembly -PathType Leaf)) {
            throw "Test assembly was not found: $testAssembly"
          }

          if (-not (Test-Path -LiteralPath $adapterPath -PathType Container)) {
            throw "NUnit test adapter directory was not found: $adapterPath"
          }

          if (-not (Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "Visual Studio locator was not found: $vswhere"
          }

          $vstest = & $vswhere `
            -latest `
            -products * `
            -find 'Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe' |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($vstest) -or -not (Test-Path -LiteralPath $vstest -PathType Leaf)) {
            throw "vstest.console.exe was not found in the installed Visual Studio instance."
          }

          & $vstest $testAssembly "/TestAdapterPath:$adapterPath"

          if ($LASTEXITCODE -ne 0) {
            throw "Dopamine tests failed with exit code $LASTEXITCODE"
          }

      - name: Stage Portable Files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          [xml]$config = Get-Content -LiteralPath $env:PACKAGER_CONFIG

          $sourceRoot = Join-Path $env:GITHUB_WORKSPACE $env:OUTPUT_DIR
          $stageRoot = Join-Path $env:GITHUB_WORKSPACE $env:ARTIFACTS_STAGE_DIR

          if (-not (Test-Path -LiteralPath $sourceRoot -PathType Container)) {
            throw "Build output directory was not found: $sourceRoot"
          }

          # 清理并创建暂存目录
          if (Test-Path -LiteralPath $stageRoot) {
            Remove-Item -LiteralPath $stageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stageRoot -Force | Out-Null

          # 根据 XML 配置拷贝文件夹
          foreach ($directory in $config.Packager.Packaging.Portable.Directories.Directory) {
            $relativePath = [string]$directory
            $source = Join-Path $sourceRoot $relativePath
            $destination = Join-Path $stageRoot $relativePath

            if (-not (Test-Path -LiteralPath $source -PathType Container)) {
              throw "Missing Portable directory: $relativePath"
            }

            New-Item -ItemType Directory -Path (Split-Path -Parent $destination) -Force | Out-Null
            Copy-Item -LiteralPath $source -Destination $destination -Recurse -Force
          }

          # 根据 XML 配置拷贝文件
          foreach ($file in $config.Packager.Packaging.Portable.Files.File) {
            $relativePath = [string]$file
            $source = Join-Path $sourceRoot $relativePath
            $destination = Join-Path $stageRoot $relativePath

            if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
              throw "Missing Portable file: $relativePath"
            }

            New-Item -ItemType Directory -Path (Split-Path -Parent $destination) -Force | Out-Null
            Copy-Item -LiteralPath $source -Destination $destination -Force
          }

          # Portable packages need the default settings file next to Dopamine.exe. Keep the source
          # default suitable for installed builds and only switch the staged copy to Portable mode.
          $baseSettingsPath = Join-Path $stageRoot 'BaseSettings.xml'
          [xml]$baseSettings = Get-Content -LiteralPath $baseSettingsPath
          $configurationNamespaces = @(
            $baseSettings.Settings.Namespace |
              Where-Object { [string]$_.Name -eq 'Configuration' }
          )

          if ($configurationNamespaces.Count -ne 1) {
            throw "BaseSettings.xml must contain exactly one Configuration namespace."
          }

          $portableSettings = @(
            $configurationNamespaces[0].Setting |
              Where-Object { [string]$_.Name -eq 'IsPortable' }
          )

          if ($portableSettings.Count -ne 1) {
            throw "BaseSettings.xml must contain exactly one Configuration.IsPortable setting."
          }

          $portableSettings[0].Value = 'True'

          $xmlWriterSettings = [System.Xml.XmlWriterSettings]::new()
          $xmlWriterSettings.Encoding = [System.Text.UTF8Encoding]::new($true)
          $xmlWriterSettings.Indent = $true
          $xmlWriterSettings.NewLineChars = "`r`n"
          $xmlWriterSettings.NewLineHandling = [System.Xml.NewLineHandling]::Replace
          $xmlWriter = [System.Xml.XmlWriter]::Create($baseSettingsPath, $xmlWriterSettings)

          try {
            $baseSettings.Save($xmlWriter)
          }
          finally {
            $xmlWriter.Dispose()
          }

          [xml]$stagedBaseSettings = Get-Content -LiteralPath $baseSettingsPath
          $stagedPortableValue = @(
            ($stagedBaseSettings.Settings.Namespace |
              Where-Object { [string]$_.Name -eq 'Configuration' }).Setting |
              Where-Object { [string]$_.Name -eq 'IsPortable' }
          )[0].Value

          if (-not [string]::Equals([string]$stagedPortableValue, 'True', [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Portable BaseSettings.xml was not configured with IsPortable=True."
          }

          $fileCount = (Get-ChildItem -LiteralPath $stageRoot -Recurse -File | Measure-Object).Count
          Write-Host "Prepared $fileCount files in $stageRoot for artifact upload."

      - name: Smoke test Portable startup
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $workspaceRoot = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE).TrimEnd('\') + '\'
          $stageRoot = [System.IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE $env:ARTIFACTS_STAGE_DIR))
          $smokeRoot = [System.IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'artifacts\portable-smoke'))

          if (-not $smokeRoot.StartsWith($workspaceRoot, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Portable smoke directory is outside the GitHub workspace: $smokeRoot"
          }

          if (Test-Path -LiteralPath $smokeRoot) {
            Remove-Item -LiteralPath $smokeRoot -Recurse -Force
          }

          Copy-Item -LiteralPath $stageRoot -Destination $smokeRoot -Recurse -Force
          $executable = Join-Path $smokeRoot 'Dopamine.exe'

          if (-not (Test-Path -LiteralPath $executable -PathType Leaf)) {
            throw "Portable smoke executable was not found: $executable"
          }

          $process = $null

          try {
            $process = Start-Process `
              -FilePath $executable `
              -WorkingDirectory $smokeRoot `
              -WindowStyle Hidden `
              -PassThru

            Start-Sleep -Seconds 8
            $process.Refresh()

            if ($process.HasExited) {
              $exitCode = $process.ExitCode
              $logs = @(Get-ChildItem -LiteralPath $smokeRoot -Filter Dopamine.log -Recurse -File -ErrorAction SilentlyContinue)

              foreach ($log in $logs) {
                Write-Host "Portable startup log: $($log.FullName)"
                Get-Content -LiteralPath $log.FullName -Tail 80
              }

              throw "Portable startup smoke test failed with exit code $exitCode."
            }

            Write-Host "Portable startup smoke test passed; Dopamine remained running for 8 seconds."
          }
          finally {
            if ($null -ne $process) {
              $process.Refresh()

              if (-not $process.HasExited) {
                Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
                Wait-Process -Id $process.Id -Timeout 10 -ErrorAction SilentlyContinue
              }
            }

            if (Test-Path -LiteralPath $smokeRoot) {
              Remove-Item -LiteralPath $smokeRoot -Recurse -Force
            }
          }

      - name: Upload Portable artifact
        uses: actions/upload-artifact@v6
        with:
          # 下载时的压缩包名称将基于此 name
          name: Dopamine-Portable-${{ github.sha }}
          # 指向准备好的暂存目录，不要指向单个 zip 文件
          path: ${{ env.ARTIFACTS_STAGE_DIR }}
          if-no-files-found: error
          retention-days: 7
